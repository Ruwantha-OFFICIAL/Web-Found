name: building application

on:
  push:
    branches: ["master"]
    paths-ignore:
      - '.github/workflows/**'
      - 'README.md'
      - '*.sh'
  pull_request:
    branches: ["master"]
    paths-ignore:
      - '.github/workflows/**'
      - 'README.md'
      - '*.sh'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Golang 
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"  
          cache: true
      - name: Install Dependencies
        run: go mod download
          
      - name: Build binary file
        run: |
          chmod +x build.sh
          ./build.sh
          
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-files
          path: release/
          if-no-files-found: error